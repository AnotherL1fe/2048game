<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="stylesheet" href="src/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048-game</title>
</head>

<body>


  <div class="game">
    <div class="gamePanel">
      <div class="scorePanel">
        <div class="currentScore">
          0
        </div>
        <div class="maxScore">
          0
        </div>
      </div>
      <button class="btn newGame">
        New game
      </button>
    </div>
    <div class="gameField">
      <div class="gameBack">
        <div class="row">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
        <div class="row">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
        <div class="row">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
        <div class="row">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
      </div>
      <div class="gameTiles">
      </div>


    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>

</html>
